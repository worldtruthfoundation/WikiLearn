{% extends "layout.html" %}
{% block title %}Songs by Genre - WikiLearn{% endblock %}

{% block content %}
<h1 class="text-center mb-3">Choose a genre</h1>
<div class="category-grid">
  {% for g in genres %}
  <a href="{{ url_for('songs_feed', genre=g) }}" class="category-card">
    <i class="fas fa-music"></i><h3>{{ g }}</h3>
  </a>
  {% endfor %}
</div>
{% endblock %}
